[pytest]
pythonpath = 
    src
filterwarnings =
    # 1. Ignorar todos los DeprecationWarnings de websockets.legacy
    ignore::DeprecationWarning:websockets.legacy:
    
    # 2. Ignorar DeprecationWarning de uvicorn (uso obsoleto de websockets)
    ignore::DeprecationWarning:uvicorn.protocols.websockets.websockets_impl:
    
    # 3. Ignorar DeprecationWarning de engineio sobre 'timeout'
    ignore::DeprecationWarning:engineio.async_client:
    
    # 4. Ignorar DeprecationWarning de websockets.legacy.server
    ignore::DeprecationWarning:websockets.legacy.server:
    
    # 5. Ignorar DeprecationWarning de _pytest sobre HTTP_422_UNPROCESSABLE_ENTITY
    ignore::DeprecationWarning:_pytest.python:

    # 6. Ignorar LegacyAPIWarning de SQLAlchemy sobre Query.get() (CORREGIDO)
    #    Captura el mensaje usando regex y especifica la clase del warning.
    ignore:The Query.get\(\) method is considered legacy:sqlalchemy.exc.LegacyAPIWarning
    
    # 7. Ignorar DeprecationWarning sobre datetime.datetime.utcnow()
    ignore:datetime\.datetime\.utcnow\(\) is deprecated:DeprecationWarning